<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder - JustHex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Base64 Encoder / Decoder</h2>

<textarea id="input" class="form-control mb-3" placeholder="Enter text"></textarea>

<button class="btn btn-success" onclick="encode()">Encode</button>
<button class="btn btn-warning" onclick="decode()">Decode</button>
<button class="btn btn-secondary" onclick="copy()">Copy</button>

<textarea id="output" class="form-control mt-3" placeholder="Result"></textarea>

<script>
function encode(){
  let input = document.getElementById("input").value;
  document.getElementById("output").value = btoa(input);
}

function decode(){
  let input = document.getElementById("input").value;
  document.getElementById("output").value = atob(input);
}

function copy(){
  let output = document.getElementById("output");
  output.select();
  document.execCommand("copy");
  alert("Copied!");
}
</script>

</body>
</html>
